<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Product preview card component</title>
  <link rel="stylesheet" href="Product.css">
</head>
<body>
  <div class="container-all">
    <div class="container">
    <div class="left"><img src="./images/image-product-desktop.jpg" alt="" class="img-left"></div>
    <div class="right"><h5>P E R F U M E</h5> 
      <div class="container-header">Gabrielle Essence Eau De Parfum</div>
      <div class="container_text">
        A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.
      </div>
      <div class="container-prices">
        <div class="actualy">$149.99</div><div class="promotion">$169.99</div>
      </div>
      <div class="container-button"><button><img src="./images/icon-cart.svg" alt="" style="margin-right:10px;">Add to Cart</button></div>
    </div>
    </div>
  </div>
</body>
</html>
