<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Results summary component</title>
  <link rel="stylesheet" href="Results.css">
</head>
<body>
  <div class="container">
    <div class="container-grid">
      <div class="left">
        <div class="container-result">
          <h1>Your Result</h1>
          <div class="circle">
            <span class="big">76</span>
            <span class="small"> of 100</span>
          </div>
          <span class="big Great">Great</span>
          <span class="small text">You scored higher than 65% of the people who have taken these tests.</span>
        </div>
      </div>
      <div class="right">
        <div class="contianer-values">
          <div class="Summary"><span class="Summary">Summary</span></div>
          <div class="container-velue">
            <div class="first-value Reaction clasic"><div class="header"><img src="./assets/images/icon-reaction.svg" alt=""> Reaction</div><div class="numbers"><span class="first-number">80</span><span class="last-numbers">/100</span></div></div>
            <div class="second-value Memory clasic"><div class="header"><img src="./assets/images/icon-memory.svg" alt=""> Memory</div><div class="numbers"><span class="first-number">92</span><span class="last-numbers">/100</span></div></div>
            <div class="third-value Verbal clasic"><div class="header"><img src="./assets/images/icon-verbal.svg" alt=""> Verbal</div><div class="numbers"><span class="first-number">61</span><span class="last-numbers">/100</span></div></div>
            <div class="fourth-value Visual clasic"><div class="header"><img src="./assets/images/icon-visual.svg" alt=""> Visual</div><div class="numbers"><span class="first-number">72</span><span class="last-numbers">/100</span></div></div>
          </div>
          <div><button class="Continue">Continue</button></div><!-- Mamahuevo digo glu glu glu glu -->
        </div>
      </div>
  </div>
</div>
</body>
</html>
