<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Proced Payment</title>
  <link rel="stylesheet" href="./procedPayment.css">
</head>
<body>
  <img src="./images/pattern-background-desktop.svg" alt="" class="background-img">
  <div class="container">
    <div class="cotainer-img">
      <img src="./images/illustration-hero.svg" alt="" class="img-top">
    </div>
    <div class="container-text">
      <h1>Order Summary</h1>
      <p class="text-mid">You can now listen to millions of songs, audiobooks, and podcasts on any 
        device anywhere you like!</p>
        <div class="container-price">
          <img src="./images/icon-music.svg" alt="" class="icon-music">
          <div class="grid-1">
          <div >Annual Plan  $59.99/year</div>
            <u>Change</u>
        </div>
        </div>
          <div class="buttons">
            <button class="payment">Proceed to Payment</button>
            <button class="cancel">Cancel Order</button>
          </div>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
